<!DOCTYPE html>
<html>

<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #state {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            line-height: 40px;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            padding-left: 10px;
            z-index: 10;
        }

        #state-img {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            object-fit: cover;
            display: none;
        }
    </style>
    <meta charset="utf-8">
    <title>PS4 5.05 Loader</title>
    <link rel="preload" as="image" href="images/init.jpg">
    <link rel="preload" as="image" href="images/exploiting.gif">
    <link rel="preload" as="image" href="images/done.gif">

    <script>
        var bin = "goldhen.bin";

        window.updateState = function (s) {
            window.currentState = s;

            var el = document.getElementById("state");
            if (el) el.innerText = s;

            var img = document.getElementById('state-img');
            if (!img) return;

            var src;
            switch (s) {
                case 'init':
                    src = 'images/init.jpg';
                    break;
                case 'exploiting':
                    src = 'images/exploiting.gif';
                    break;
                case 'done':
                    src = 'images/done.gif';
                    break;
                case 'fail':
                default:
                    img.style.display = 'none';
                    try { img.removeAttribute('src'); } catch (e) { }
                    return;
            }

            /* prevent requesting the same image twice */
            if (img.getAttribute('src') === src) {
                img.style.display = 'block';
                return;
            }

            img.onload = function () { this.style.display = 'block'; };
            img.onerror = function () { this.style.display = 'none'; };
            img.style.display = 'none';
            img.src = src;
        };

        function loadExploit() {
            var s = document.createElement("script");
            s.src = "exploit.js";

            s.onload = () => {
                setTimeout(updateState('exploiting'), 250);
                setTimeout(exploit, 1000);
            };

            document.body.appendChild(s);
        }

        window.onload = function () { updateState('init'); loadExploit(); };
    </script>

</head>

<body>
    <div id="state"></div>
    <img id="state-img" src="images/init.jpg" alt="state image" style="max-width:100%;display:none;margin-top:8px" />
</body>

</html>
